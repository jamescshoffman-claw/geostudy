<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Geo Study</title>
    <!-- GitHub Pages has no SPA history fallback: it serves this 404 page for any
         unknown path (e.g. /travelpath). Stash the requested path and bounce to
         the app root, where index.html restores it via history.replaceState. -->
    <script>
      var l = window.location;
      try { sessionStorage.setItem('spa-redirect', l.pathname + l.search + l.hash); } catch (e) {}
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    </script>
  </head>
  <body></body>
</html>
